name: admin_panel
description: Flutter Web Admin Panel for the clothing e-commerce platform.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  supabase_flutter: ^2.5.0
  fpdart: ^1.1.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1
  intl: ^0.20.2
  logging: ^1.2.0
  envied: ^1.3.4
  build_runner: ^2.4.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  analyzer: 6.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
